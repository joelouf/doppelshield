name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (report to code scanning)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:scan
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'

      - name: Scan image (fail on fixable HIGH/CRITICAL)
        run: |
          trivy image \
            --cache-dir "$GITHUB_WORKSPACE/.cache/trivy" \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --ignorefile .trivyignore.yaml \
            ghcr.io/${{ github.repository }}:scan

      - name: Upload scan results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: container-image

      - id: push
        name: Push image with SBOM and provenance
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  mirror:
    needs: publish
    if: vars.AWS_RELEASE_ROLE_ARN != '' && needs.publish.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: us-east-2

      - id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Mirror image by digest
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          SOURCE_IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ needs.publish.outputs.version }}
          DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          docker buildx imagetools create \
            --tag "$ECR_REGISTRY/doppelshield:$VERSION" \
            "$SOURCE_IMAGE@$DIGEST"

      - name: Verify the mirrored digest is unchanged
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          VERSION: ${{ needs.publish.outputs.version }}
          DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          mirrored=$(docker buildx imagetools inspect \
            "$ECR_REGISTRY/doppelshield:$VERSION" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          test "$mirrored" = "$DIGEST"

  deploy:
    needs: [publish, mirror]
    if: vars.AWS_DEPLOY_ROLE_ARN != '' && needs.publish.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://doppelshield.com
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Roll the ECS service to the released digest
        env:
          DIGEST: ${{ needs.publish.outputs.digest }}
          REGION: us-east-2
          CLUSTER: doppelshield
          SERVICE: doppelshield
          FAMILY: doppelshield
          CONTAINER: doppelshield
        run: |
          set -euo pipefail
          account="$(aws sts get-caller-identity --query Account --output text)"
          image="${account}.dkr.ecr.${REGION}.amazonaws.com/doppelshield@${DIGEST}"
          echo "Deploying image ${image}"

          aws ecs describe-task-definition --task-definition "$FAMILY" \
            --query 'taskDefinition' --output json > current-taskdef.json

          jq --arg img "$image" --arg name "$CONTAINER" '
            (.containerDefinitions[] | select(.name == $name) | .image) = $img
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' current-taskdef.json > new-taskdef.json

          new_arn="$(aws ecs register-task-definition \
            --cli-input-json file://new-taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "Registered ${new_arn}"

          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$new_arn" >/dev/null
          echo "Rolling deployment; waiting for the service to reach steady state..."
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

          live_arn="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition | [0]' \
            --output text)"
          if [ "$live_arn" != "$new_arn" ]; then
            echo "::error::Service did not converge on ${new_arn} (live: ${live_arn}); the deployment circuit breaker rolled it back."
            exit 1
          fi
          echo "Deployed and stable on ${new_arn}"

  github-release:
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create the GitHub Release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it unchanged."
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag \
              --title "$TAG" --generate-notes
          fi
