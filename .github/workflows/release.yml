name: Release

# Publishes the deployable artifact: A container image on GHCR, scanned before push, with a BuildKit SBOM and provenance attached to the image and a GitHub build-provenance attestation bound to its digest.
# Deploys pull by digest, so any OCI host consumes the same artifact.
# An ECR mirror is a drop-in additional login & tag if AWS is ever adopted.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # Push to GHCR.
      packages: write
      # OIDC for the provenance attestation.
      id-token: write
      # Actions/attest-build-provenance.
      attestations: write
      # Upload the Trivy SARIF to code scanning.
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          # The default flavor also tags stable (non-prerelease) semver releases as `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Build once into the local Docker store so the exact bytes can be scanned before anything is published.
      # The buildx cache makes the later push step a re-tag, not a rebuild.
      - name: Build for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: scan-target:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Report pass: Full results to code scanning as SARIF.
      # In SARIF mode the action ignores severity filters by design, so this step never gates.
      # Exists purely for visibility in the Security tab.
      - name: Scan image (report to code scanning)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'

      # Gate pass: Table mode honors the filters, so this enforces the actual release policy.
      # Block only on HIGH/CRITICAL findings that have a fix.
      # Prints readable findings table in the log when it fails.
      - name: Scan image (fail on fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          skip-setup-trivy: true

      - name: Upload scan results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: trivy-image.sarif
          category: container-image

      # sbom & provenance attach BuildKit attestations to the image manifest, so any registry consumer can inspect what went into the build.
      - id: push
        name: Push image with SBOM and provenance
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha

      # Sigstore-signed statement binding this digest to this workflow run.
      # Verifiable with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
