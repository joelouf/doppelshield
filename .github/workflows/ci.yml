name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      # Reuse Next.js's build cache across runs so the Build step only recompiles what changed.
      # Keyed on the lockfile plus source hashes.
      # restore-keys lets a run fall back to the latest cache for this lockfile.
      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage thresholds)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      # Moderate and above fail the build.
      # Tree is clean at this level.
      # The one prior moderate (postcss < 8.5.10) is pinned to a patched release via the "overrides" block in package.json.
      - name: Audit (fail on moderate and above)
        run: npm audit --audit-level=moderate

  # The Docker image is the deployable artifact, so a Dockerfile that no longer builds is a broken release even when the app itself compiles.
  # Build (without pushing) on every run so image breakage is caught at PR time, not at tag time.
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: doppelshield:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
