name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      # Reuse Next.js's build cache across runs so the Build step only
      # recompiles what changed. Keyed on the lockfile plus source hashes;
      # restore-keys lets a run fall back to the latest cache for this lockfile.
      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage thresholds)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      # Moderate and above fail the build. The tree is clean at this level; the
      # one prior moderate (postcss < 8.5.10, bundled under next) is pinned to a
      # patched release via the "overrides" block in package.json.
      - name: Audit (fail on moderate and above)
        run: npm audit --audit-level=moderate
