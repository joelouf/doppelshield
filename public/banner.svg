<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="1200" height="250" role="img"
    aria-label="DoppelShield / URL Forensics and Homograph Scanner">
    <title>DoppelShield / URL Forensics &amp; Homograph Scanner</title>
    <defs>
        <radialGradient id="glow" cx="50%" cy="32%" r="60%">
            <stop offset="0%" stop-color="#c7f23c" stop-opacity="0.10" />
            <stop offset="70%" stop-color="#c7f23c" stop-opacity="0" />
        </radialGradient>
        <filter id="grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
        <style>
            .mono {
                font-family: ui-monospace, 'JetBrains Mono', 'SFMono-Regular', 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;
            }
        </style>
    </defs>

    <rect width="1200" height="250" fill="#080a07" />
    <rect width="1200" height="250" fill="url(#glow)" />
    <rect width="1200" height="250" filter="url(#grain)" opacity="0.03" />

    <g fill="none" stroke="#c7f23c" stroke-width="3">
        <path d="M587,86 L587,64 L609,64" />
        <path d="M613,74 L613,96 L591,96" opacity="0.5" />
    </g>

    <text x="600" y="141" text-anchor="middle" class="mono" font-size="30" font-weight="700" letter-spacing="10">
        <tspan fill="#f1f5ea">DOPPEL<tspan fill="#828b74">SHIELD</tspan>
        </tspan>
    </text>

    <text x="600" y="180" text-anchor="middle" class="mono" font-size="15" fill="#828b74" letter-spacing="4">URL
        FORENSICS &amp; HOMOGRAPH DETECTION</text>
</svg>
